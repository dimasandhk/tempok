name: Release

on:
  push:
    tags:
      - 'v*' # Trigger the workflow when a tag starting with 'v' is pushed (e.g., v1.0.0)

permissions:
  contents: write # Required to allow GoReleaser to create a GitHub Release

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # GoReleaser needs the full history to generate the changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # GitHub provides this token automatically for Actions
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
